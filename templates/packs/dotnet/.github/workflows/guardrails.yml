name: guardrails

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - '.noslop.json'
      - '.githooks/**'
      - '.github/workflows/**'
      - '.claude/settings.json'
      - '.claude/hooks/**'
      - 'scripts/check'
      - 'scripts/fmt'
      - 'scripts/lint'
      - 'scripts/mutation'
      - 'scripts/run-package-script'
      - 'scripts/spell'
      - 'scripts/test'
      - 'scripts/typecheck'
      - 'scripts/guardrails/**'
      - 'eslint.config.js'
      - 'eslint.config.mjs'
      - 'prettier.config.mjs'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - 'vitest.config.ts'
      - '.dependency-cruiser.mjs'
      - 'knip.config.ts'
      - 'Directory.Build.props'
      - '.editorconfig'

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block unreviewed hook/CI changes
        run: |
          if ! gh pr view "${{ github.event.pull_request.number }}" --json labels \
            --jq '.labels[].name' | grep -q 'noslop-approved'; then
            echo "::error::Protected noslop files modified. Add 'noslop-approved' label."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
