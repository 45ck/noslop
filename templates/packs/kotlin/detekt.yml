# detekt configuration — enforced by noslop
complexity:
  active: true

  CyclomaticComplexMethod:
    active: true
    threshold: 10

  CognitiveComplexMethod:
    active: true
    threshold: 15

  LongMethod:
    active: true
    threshold: 80

  LongParameterList:
    active: true
    functionThreshold: 4
    constructorThreshold: 4

  LargeClass:
    active: true
    threshold: 350

  NestedBlockDepth:
    active: true
    threshold: 4

  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20

style:
  active: true

  MaxLineLength:
    active: true
    maxLineLength: 120

  UnusedImports:
    active: true

  UnusedPrivateMember:
    active: true

potential-bugs:
  active: true

  UnusedUnaryOperator:
    active: true

empty-blocks:
  active: true

  EmptyFunctionBlock:
    active: true
