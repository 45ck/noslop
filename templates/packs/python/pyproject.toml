[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "D",      # docstring rules — enable when the project matures
  "ANN",    # type annotation rules — use mypy for this
  "COM812", # trailing comma (conflicts with formatter)
  "ISC001", # implicit string concat (conflicts with formatter)
]

[tool.ruff.lint.mccabe]
# Cyclomatic complexity cap — enforced by noslop
max-complexity = 10

[tool.mypy]
strict = true
ignore_missing_imports = true
