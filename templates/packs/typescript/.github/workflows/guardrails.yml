name: guardrails

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - '.noslop.json'
      - '.githooks/**'
      - '.github/workflows/**'
      - '.claude/settings.json'
      - '.claude/hooks/**'
      - 'scripts/check'
      - 'scripts/fmt'
      - 'scripts/lint'
      - 'scripts/mutation'
      - 'scripts/run-package-script'
      - 'scripts/spell'
      - 'scripts/test'
      - 'scripts/typecheck'
      - 'scripts/guardrails/**'

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block unreviewed hook/CI changes
        run: |
          echo "::error::This PR modifies protected noslop files."
          echo "::error::Add the 'noslop-approved' label to proceed."
          if ! gh pr view "${{ github.event.pull_request.number }}" --json labels \
            --jq '.labels[].name' | grep -q 'noslop-approved'; then
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
